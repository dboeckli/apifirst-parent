spring:
  application:
    name: apifirst-client
  docker:
    compose:
      readiness:
        wait: always
        timeout: 5m       # default ist 2m
        tcp:
          connect-timeout: 5s
          read-timeout: 5s
      file: compose.yaml
      enabled: true
      stop:
        command: down
      skip:
        in-tests: false
          
management:
  observations:
    annotations:
      enabled: true
    http:
      server:
        requests:
          name: http.server.requests
      client:
        requests:
          name: http-client-requests
